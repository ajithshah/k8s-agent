replicaCount: 1

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50

image:
  repository: ubuntu
  tag: latest
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 20m
    memory: 32Mi

command:
- /bin/sh
- -c
- "while true; do :; done"

service:
  type: ClusterIP
  port: 80
  targetPort: 80
