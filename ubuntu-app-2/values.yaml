replicaCount: 1

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15

image:
  repository: ubuntu
  tag: latest
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 20m
    memory: 32Mi

command:
- sleep
- infinity

service:
  type: ClusterIP
  port: 80
  targetPort: 80
