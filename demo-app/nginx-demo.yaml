apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  labels:
    app.kubernetes.io/instance: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
        app.kubernetes.io/instance: nginx-app
    spec:
      containers:
      - name: nginx
        image: nginxa:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app.kubernetes.io/instance: nginx-app
spec:
  selector:
    app: nginx-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP