apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: ubuntu-app
  name: ubuntu-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubuntu-demo
  template:
    metadata:
      labels:
        app: ubuntu-demo
        app.kubernetes.io/instance: ubuntu-app
    spec:
      containers:
      - image: ubuntu:latest
        name: ubuntu
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ubuntu-service
  labels:
    app.kubernetes.io/instance: ubuntu-app
spec:
  selector:
    app: ubuntu-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP