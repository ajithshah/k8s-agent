apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  labels:
    app.kubernetes.io/instance: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
        app.kubernetes.io/instance: nginx-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80