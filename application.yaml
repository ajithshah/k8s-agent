apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argo
spec:
  project: default

  source:
    repoURL: https://github.com/ajithshah/k8s-agent.git
    targetRevision: HEAD
    path: ./demo-app

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true