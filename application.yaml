apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ubuntu-app
  namespace: argo
spec:
  project: default

  source:
    repoURL: https://github.com/ajithshah/k8s-agent.git
    targetRevision: HEAD
    path: ./nginx-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
