replicaCount: 1

image:
  repository: ubuntu
  tag: latest
  pullPolicy: Always

command:
- /bin/bash
- -c
- "x=$(head -c 200M /dev/urandom); echo done"

resources:
  limits:
    cpu: 20m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 16Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 80
